Server:
  port: 8080

# 数据库配置（示例：MySQL）
spring:
  datasource:
    url: jdbc:mysql://localhost:33060/testdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml    # 映射文件位置
  type-aliases-package: com.SpringBoot_Test.Model  # 实体类包
  configuration:
    map-underscore-to-camel-case: true


