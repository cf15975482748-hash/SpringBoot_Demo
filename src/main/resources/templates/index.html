<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理 GUI (Thymeleaf)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #dee2e6; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 class="text-primary">用户信息列表 (GUI)</h2>
        <p class="text-muted">这是通过 Controller 直接调用的 GUI 界面</p>
    </div>

    <div class="table-container">
        <table class="table table-hover table-striped border">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>年龄</th>
                </tr>
            </thead>
            <tbody>
                <!-- 使用 Thymeleaf 循环渲染数据 -->
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.name}">张三</td>
                    <td th:text="${user.age}">20</td>
                </tr>
                <!-- 如果没有数据 -->
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="3" class="text-center">数据库中暂无记录</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="mt-3 text-end">
        <a href="/" class="btn btn-sm btn-outline-secondary">刷新页面</a>
    </div>
</div>

</body>
</html>
