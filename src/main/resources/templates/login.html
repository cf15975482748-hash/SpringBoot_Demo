<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - SpringBoot Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .btn-primary { border-radius: 0.5rem; padding: 0.6rem; }
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1050; }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4">项目管理系统登录</h3>
    <form th:action="@{/doLogin}" method="post">
        <div class="mb-3">
            <label class="form-label">用户名</label>
            <input type="text" name="username" class="form-control" required placeholder="请输入账号">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" required placeholder="请输入密码">
        </div>
        <div class="mb-4">
            <label class="form-label">登录身份</label>
            <select name="role" class="form-select">
                <option value="admin">管理员</option>
                <option value="teacher">老师</option>
                <option value="student">学生</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">立即登录</button>
    </form>
</div>

<!-- 错误提示 Toast -->
<div class="toast-container" th:if="${error}">
    <div id="errorToast" class="toast align-items-center text-white bg-danger border-0 show" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" th:text="${error}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var toastEl = document.getElementById('errorToast');
        if (toastEl) {
            setTimeout(function () {
                var toast = new bootstrap.Toast(toastEl);
                toast.hide();
            }, 3000);
        }
    });
</script>
</body>
</html>
