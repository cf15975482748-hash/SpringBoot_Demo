<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>账号管理 - SpringBoot Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { margin-top: 50px; }
        .card { margin-bottom: 20px; }
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1050; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">项目管理系统</a>
        <div class="d-flex">
            <span class="navbar-text me-3" th:text="'管理员: ' + ${session.loginUser.realName}"></span>
            <a href="/" class="btn btn-outline-info btn-sm me-2">返回主页</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">退出</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>账号管理中心</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAccountModal">新增账号</button>
    </div>

    <!-- 管理员列表 -->
    <div class="card">
        <div class="card-header bg-secondary text-white">管理员列表</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead><tr><th>ID</th><th>用户名</th><th>密码</th><th>真实姓名</th><th>操作</th></tr></thead>
                <tbody>
                    <tr th:each="a : ${admins}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.username}"></td>
                        <td th:text="${a.password}"></td>
                        <td th:text="${a.realName}"></td>
                        <td>
                            <button type="button" class="btn btn-primary btn-sm" 
                                    th:data-role="admin"
                                    th:data-username="${a.username}"
                                    th:data-password="${a.password}"
                                    th:data-realname="${a.realName}"
                                    onclick="editAccount(this)">修改</button>
                            <form th:action="@{/admin/deleteAccount}" method="post" style="display:inline;">
                                <input type="hidden" name="role" value="admin">
                                <input type="hidden" name="username" th:value="${a.username}">
                                <button type="submit" class="btn btn-danger btn-sm" th:disabled="${a.username == 'admin'}" onclick="return confirm('确认删除该管理员？')">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 老师列表 -->
    <div class="card">
        <div class="card-header bg-success text-white">老师列表</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead><tr><th>ID</th><th>用户名</th><th>密码</th><th>真实姓名</th><th>操作</th></tr></thead>
                <tbody>
                    <tr th:each="t : ${teachers}">
                        <td th:text="${t.id}"></td>
                        <td th:text="${t.username}"></td>
                        <td th:text="${t.password}"></td>
                        <td th:text="${t.realName}"></td>
                        <td>
                            <button type="button" class="btn btn-primary btn-sm" 
                                    th:data-role="teacher"
                                    th:data-username="${t.username}"
                                    th:data-password="${t.password}"
                                    th:data-realname="${t.realName}"
                                    onclick="editAccount(this)">修改</button>
                            <form th:action="@{/admin/deleteAccount}" method="post" style="display:inline;">
                                <input type="hidden" name="role" value="teacher">
                                <input type="hidden" name="username" th:value="${t.username}">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('确认删除该老师？')">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 学生列表 -->
    <div class="card">
        <div class="card-header bg-info text-white">学生列表</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead><tr><th>ID</th><th>用户名</th><th>密码</th><th>真实姓名</th><th>操作</th></tr></thead>
                <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.id}"></td>
                        <td th:text="${s.username}"></td>
                        <td th:text="${s.password}"></td>
                        <td th:text="${s.realName}"></td>
                        <td>
                            <button type="button" class="btn btn-primary btn-sm" 
                                    th:data-role="student"
                                    th:data-username="${s.username}"
                                    th:data-password="${s.password}"
                                    th:data-realname="${s.realName}"
                                    onclick="editAccount(this)">修改</button>
                            <form th:action="@{/admin/deleteAccount}" method="post" style="display:inline;">
                                <input type="hidden" name="role" value="student">
                                <input type="hidden" name="username" th:value="${s.username}">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('确认删除该学生？')">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 修改账号 Modal -->
<div class="modal fade" id="editAccountModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>修改账号</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/updateAccount}" method="post">
                <input type="hidden" name="role" id="editRole">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">用户名 (不可修改)</label>
                        <input type="text" name="username" id="editUsername" class="form-control" readonly>
                    </div>
                    <div class="mb-3"><label class="form-label">密码</label><input type="text" name="password" id="editPassword" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">真实姓名</label><input type="text" name="realName" id="editRealName" class="form-control" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">确认修改</button></div>
            </form>
        </div>
    </div>
</div>

<!-- 新增账号 Modal -->
<div class="modal fade" id="addAccountModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>新增账号</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/addAccount}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        <select name="role" class="form-select">
                            <option value="admin">管理员</option>
                            <option value="teacher">老师</option>
                            <option value="student">学生</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label">用户名</label><input type="text" name="username" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">密码</label><input type="text" name="password" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">真实姓名</label><input type="text" name="realName" class="form-control" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">提交保存</button></div>
            </form>
        </div>
    </div>
</div>

<div class="toast-container" th:if="${error}">
    <div id="errorToast" class="toast align-items-center text-white bg-danger border-0 show" role="alert">
        <div class="d-flex"><div class="toast-body" th:text="${error}"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var toastEl = document.getElementById('errorToast');
        if (toastEl) { setTimeout(function () { new bootstrap.Toast(toastEl).hide(); }, 3000); }
    });

    function editAccount(btn) {
        document.getElementById('editRole').value = btn.getAttribute('data-role');
        document.getElementById('editUsername').value = btn.getAttribute('data-username');
        document.getElementById('editPassword').value = btn.getAttribute('data-password');
        document.getElementById('editRealName').value = btn.getAttribute('data-realname');
        new bootstrap.Modal(document.getElementById('editAccountModal')).show();
    }
</script>
</body>
</html>
